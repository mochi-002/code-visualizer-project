<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Vizualiser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/all.min.css" />
  <link rel="stylesheet" href="./css/global_rules.css" />
  <link rel="stylesheet" href="./css/normalize.css" />
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body class="font-sans">
  <div id="root"
    class="flex flex-col h-screen bg-[#f5f4f2] dark:bg-main text-[#1c1c1c] dark:text-ink text-lg transition-colors duration-main">

    <!-- Top bar -->
    <div
      class="flex flex-wrap items-center justify-between gap-3.5 px-4 sm:px-5 py-2.5 border-b border-[#e2e0dc] dark:border-border1 shrink-0 bg-[#f5f4f2] dark:bg-main transition-colors duration-main">

      <!-- Logo -->
      <span class="text-second uppercase tracking-[0.15em] font-medium text-base sm:text-lg">Code Vizualiser</span>

      <!-- Language buttons -->
      <div class="flex items-center gap-3 ml-auto">
        <div class="flex gap-1.5">
          <button id="btn-python" data-lang="python" class="lang-btn lang-btn-python-hover lang-btn-python-active">
            Python
          </button>
          <button id="btn-cpp" data-lang="cpp" class="lang-btn lang-btn-cpp-hover lang-btn-inactive">
            C++
          </button>
        </div>

        <!-- theme toggle -->
        <button id="btn-theme" aria-label="Toggle dark mode"
          class="w-8 h-8 flex items-center justify-center rounded-main border border-[#d8d6d1] dark:border-border2 hover:border-sky-400 dark:hover:border-amber-400 transition-all duration-main">
          <i class="fa-solid fa-moon dark:hidden text-sky-400 drop-shadow-[0_0_4px_rgba(56,189,248,0.6)]"></i>
          <i class="fa-solid fa-sun hidden dark:inline text-amber-400 drop-shadow-[0_0_4px_rgba(251,191,36,0.6)]"></i>
        </button>
      </div>
    </div>

    <!-- Panels -->
    <div class="flex flex-col flex-1 min-h-0 overflow-hidden lg:flex-row">

      <!-- Left panel -->
      <div
        class="flex flex-col w-full lg:w-1/2 min-h-0 border-b lg:border-b-0 lg:border-r border-[#e2e0dc] dark:border-border1 bg-[#f5f4f2] dark:bg-main transition-colors duration-main">

        <!-- Code editor buttons -->
        <div class="editor">
          <div
            class="h-[45px] flex items-center gap-2 px-3.5 py-2 border-b border-[#e2e0dc] dark:border-border1 bg-[#ececec] dark:bg-[#111] shrink-0">
            <div class="w-3.5 h-3.5 rounded-full bg-[#ff5f57]"></div>
            <div class="w-3.5 h-3.5 rounded-full bg-[#febc2e]"></div>
            <div class="w-3.5 h-3.5 rounded-full bg-[#28c840]"></div>
            <span id="filename" class="text-[#999] dark:text-[#555] ml-2">main.py</span>
          </div>
        </div>

        <!-- Code editor -->
        <div class="flex flex-1 min-h-0 overflow-hidden">
          <div id="line-nums"
            class="pt-3.5 pr-[11px] pb-3.5 pl-2 text-right select-none text-[#b7b5b0] dark:text-[#383838] text-[17px] leading-7 min-w-[50px] sm:min-w-[50px] bg-[#f5f4f2] dark:bg-main border-r border-[#e2e0dc] dark:border-border1 overflow-hidden">
            <div id="line-num-content" class="whitespace-pre">1</div>
          </div>
          <textarea id="code-editor" spellcheck="false" autocorrect="off" autocapitalize="off" autocomplete="off"
            class="flex-1 bg-[#f5f4f2] dark:bg-main text-[#2f7d43] dark:text-[#a8d8a8] leading-7 font-mono px-3 sm:px-[17px] py-3.5 border-none resize-none outline-none overflow-y-auto whitespace-pre caret-second text-base"
            style="tab-size: 6;"></textarea>
        </div>

        <!-- Code buttons -->
        <div
          class="flex flex-wrap border-t border-[#e2e0dc] dark:border-border1 items-center gap-[7px] px-3.5 py-[11px] lg:h-[56px] lg:py-0 bg-[#ececec] dark:bg-[#111] shrink-0">
          <button id="checkCode"
            class="flex items-center px-4 sm:px-5 py-1.5 rounded-main border border-[#d8d6d1] dark:border-border2 bg-transparent text-[#555] dark:text-[#aaa] cursor-pointer transition-all duration-main hover:bg-[#555] hover:text-[#f5f4f2] dark:hover:bg-[#aaa] dark:hover:text-main text-sm sm:text-base">
            Check
          </button>
          <button id="runCode"
            class="flex items-center px-4 sm:px-5 py-1.5 rounded-main border border-second text-second bg-[#ffe9da] dark:bg-[#1a1209] cursor-pointer transition-all duration-main hover:bg-second hover:text-white dark:hover:text-main text-sm sm:text-base">
            Run
          </button>
          <button onclick="visualize()"
            class="flex items-center px-4 sm:px-5 py-1.5 rounded-main border border-vis text-vis bg-transparent cursor-pointer transition-all duration-main hover:bg-vis hover:text-white dark:hover:text-main text-sm sm:text-base">
            Visualize
          </button>
          <span class="i-syntax ml-auto px-5 py-1.5 rounded-main self-center hidden"></span>
        </div>

        <div
          class="flex flex-col sm:flex-row shrink-0 border-t border-[#e2e0dc] dark:border-border1 min-h-[120px] sm:h-[100px]">
          <div class="flex-1 flex flex-col border-b sm:border-b-0 sm:border-r border-[#e2e0dc] dark:border-border1">
            <div
              class="px-3.5 py-1.5 text-[#777] dark:text-[#444] bg-[#f5f4f2] dark:bg-main uppercase border-b border-[#e2e0dc] dark:border-border1 shrink-0 tracking-[0.1em] text-xs sm:text-sm">
              Input
            </div>
            <textarea id="input-box" spellcheck="false" autocorrect="off" autocapitalize="off" autocomplete="off"
              class="flex-1 min-h-[60px] sm:min-h-0 bg-[#f5f4f2] dark:bg-main text-[#333] dark:text-[#c8c4bc] px-2.5 py-1.5 border-none outline-none resize-none text-base"></textarea>
          </div>
          <div class="flex flex-col flex-1">
            <div
              class="px-3.5 py-1.5 text-[#777] dark:text-[#444] bg-[#f5f4f2] dark:bg-main uppercase border-b border-[#e2e0dc] dark:border-border1 shrink-0 tracking-[0.1em] text-xs sm:text-sm">
              Output
            </div>
            <div id="ouptut-box"
              class="flex-1 min-h-[60px] sm:min-h-0 bg-[#f5f4f2] dark:bg-main text-[#2f7d43] dark:text-[#a8d8a8] px-2.5 py-1.5 overflow-y-auto whitespace-pre-wrap leading-[1.55] lowercase text-base">
              Run your code to see the Output ...
            </div>
          </div>
        </div>
      </div>

      <!-- Right panel -->
      <div class="flex flex-col w-full lg:w-1/2 min-h-0 bg-[#f5f4f2] dark:bg-main transition-colors duration-main">

        <div class="flex-1 flex flex-col min-h-0 overflow-hidden border-b border-[#e2e0dc] dark:border-border1">
          <div
            class="h-[45px] flex items-center gap-2 px-3.5 py-2 border-b border-[#e2e0dc] dark:border-border1 bg-[#ececec] dark:bg-[#111] shrink-0">
            <span class="text-vis uppercase tracking-[0.15em] text-sm sm:text-base">Vizualiser</span>
            <span id="viz-detected" class="ml-auto text-[#999] dark:text-[#444] text-xs sm:text-sm">auto-detect from
              code</span>
          </div>
          <div id="viz-canvas" class="flex items-center justify-center flex-1 min-h-0 p-3 overflow-auto">
            <div class="dark:text-[#c9c7c2] text-[#2a2a2a] text-center leading-[2px]">
              Click <span class="capitalize dark:text-vis text-sky-700">vizualise</span>
            </div>
          </div>
        </div>

        <div class="h-[156px] flex flex-col shrink-0">
          <div
            class="h-[61px] flex items-center gap-[7px] px-3.5 py-[11px] bg-[#ececec] dark:bg-[#111] shrink-0 border-b border-[#e2e0dc] dark:border-border1">
            <span class="text-second tracking-[0.15em] uppercase text-sm sm:text-base">Tracer</span>
            <div class="flex gap-1">
              <button onclick="stepBack()"
                class="rounded-main border border-[#d8d6d1] dark:border-border2 text-[#777] dark:text-[#666] px-2 py-0.5 cursor-pointer transition-all duration-main hover:bg-second hover:text-white dark:hover:text-main hover:border-second">
                <i class="fa-solid fa-arrow-left"></i>
              </button>
              <button onclick="stepFwd()"
                class="rounded-main border border-[#d8d6d1] dark:border-border2 text-[#777] dark:text-[#666] px-2 py-0.5 cursor-pointer transition-all duration-main hover:bg-second hover:text-white dark:hover:text-main hover:border-second">
                <i class="fa-solid fa-arrow-right"></i>
              </button>
            </div>
            <span id="current-line" class="ml-auto tracking-[0.15em] text-[#999] dark:text-[#555] text-sm">line -</span>
          </div>
          <div id="tracer-body" class="flex-1 flex flex-col gap-[3px] px-3 py-1.5 h-auto overflow-auto">
            <div class="text-[#d8d6d1] dark:text-border2 text-center sm:text-xl text-base">Run the code to trace its
              steps</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="scripts/main.js"></script>
  <script type="module" src="scripts/runner/runCode.js"></script>
  <script type="module" src="scripts/editor/language.js"></script>
</body>

</html>
